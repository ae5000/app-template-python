service:
  name: my-service
  group: engineering
  description: "Short description of what this service does"
  owners:
    - your-email@example.com

runtime:
  port: 8000
  health_check: /health

expose:
  preset: all
  access:
    require_any_group:
      - engineering

# Optional: provision a dedicated Postgres database for this service.
# When true, provision-service.sh creates a DB + user on the managed cluster
# and stores the connection string as a Swarm secret. Read in the service with:
#   read_secret("DATABASE_URL")  # from platform_auth import read_secret
#
# database:
#   postgres: true

# Optional: inject additional secrets from .env.secrets into the container.
# Each name must have a matching {SERVICE_PREFIX}_{NAME} key in .env.secrets.
# Values are stored as Swarm secrets, mounted at /run/secrets/{NAME}.
# Read with: read_secret("MY_API_KEY")
#
# secrets:
#   - MY_API_KEY
#   - STRIPE_SECRET_KEY
