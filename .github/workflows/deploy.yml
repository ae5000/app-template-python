name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      IMAGE: registry.digitalocean.com/${{ vars.REGISTRY_NAME }}/${{ github.event.repository.name }}
      # SWARM_SERVICE_NAME defaults to repo name. Override as a repo variable
      # when the Swarm service name differs (e.g. bgrx-gateway → mcp-gateway).
      SWARM_SERVICE: ${{ vars.SWARM_SERVICE_NAME || github.event.repository.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to DOCR
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Deploy to Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_SSH_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            docker service update \
              --image registry.digitalocean.com/${{ vars.REGISTRY_NAME }}/${{ github.event.repository.name }}:${{ github.sha }} \
              --update-order start-first \
              --with-registry-auth \
              platform_${{ env.SWARM_SERVICE }}

      - name: Notify platform registry
        env:
          PLATFORM_TOKEN: ${{ secrets.PLATFORM_TOKEN }}
          PLATFORM_DOMAIN: ${{ vars.PLATFORM_DOMAIN }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $PLATFORM_TOKEN" \
            "https://registry.$PLATFORM_DOMAIN/registry/$REPO_NAME/heartbeat" \
            || true
